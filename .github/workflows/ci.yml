# ─────────────────────────────────────────────────────────────────────────────
# MODUS — Continuous Build on Push
#
# Selectively rebuilds only the service(s) that changed:
#   - bot/**  → ghcr.io/<owner>/modus-bot:<branch>        (all branches)
#               ghcr.io/<owner>/modus-bot:latest          (main only)
#   - web/**  → ghcr.io/<owner>/modus-web:<branch>        (all branches)
#               ghcr.io/<owner>/modus-web:latest          (main only)
#
# Also tags every build with :sha-<short-sha>. Can be triggered manually via
# workflow_dispatch. Versioned/tagged images are still produced by
# docker-publish.yml when a release is merged.
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Selective Build & Deploy

on:
  push:
    branches:
      - main
      - "**"
    paths:
      - "bot/**"
      - "web/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            bot:
              - "bot/**"
            web:
              - "web/**"

  # ── Build Bot Image (only if bot/** changed) ──────────────────────────────
  build-bot:
    name: Build Bot Image
    needs: changes
    if: ${{ needs.changes.outputs.bot == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/modus-bot
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Bot image
        uses: docker/build-push-action@v7
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Web Image (only if web/** changed) ──────────────────────────────
  build-web:
    name: Build Web Image
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/modus-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
